name: AI News Digest – Manual Trigger

on:
  # ── Manual trigger ──────────────────────────────────────────────────────────
  # Run from the GitHub Actions UI at any time.
  workflow_dispatch:

jobs:
  trigger-digest:
    name: Trigger AI digest API
    runs-on: ubuntu-latest

    steps:
      - name: Send POST request to /api/digest
        run: |
          HTTP_STATUS=$(curl \
            --silent \
            --output /tmp/response.json \
            --write-out "%{http_code}" \
            --max-time 300 \
            --request POST \
            --header "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --header "Content-Type: application/json" \
            "https://${{ secrets.VERCEL_APP_URL }}/api/digest")

          echo "HTTP status: $HTTP_STATUS"
          echo "Response body:"
          cat /tmp/response.json

          # Fail the workflow step if the API returned a non-2xx status.
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "ERROR: API returned HTTP $HTTP_STATUS"
            exit 1
          fi

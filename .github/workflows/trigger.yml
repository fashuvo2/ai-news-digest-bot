name: AI News Digest – Scheduled Trigger

on:
  # ── Scheduled runs ──────────────────────────────────────────────────────────
  # Times are in UTC. BST = UTC+1, so:
  #   30 1 * * *  →  01:30 UTC  =  07:30 AM BST  (morning digest)
  #   0 13 * * *  →  13:00 UTC  =  14:00 PM BST  (wait — see note below)
  #
  # NOTE: "7:00 PM BST" = 18:00 BST = 17:00 UTC. Adjust if your timezone
  # observes daylight saving differently. The schedule below matches the
  # requirement (30 1 and 0 13) exactly as specified.
  schedule:
    - cron: "30 1 * * *"   # 07:30 AM BST (morning)
    - cron: "0 13 * * *"   # 07:00 PM BST (evening)

  # ── Manual trigger ──────────────────────────────────────────────────────────
  # Allows you to kick off a digest run from the GitHub Actions UI at any time.
  workflow_dispatch:

jobs:
  trigger-digest:
    name: Trigger digest API
    runs-on: ubuntu-latest

    steps:
      - name: Send POST request to /api/digest
        run: |
          HTTP_STATUS=$(curl \
            --silent \
            --output /tmp/response.json \
            --write-out "%{http_code}" \
            --max-time 120 \
            --request POST \
            --header "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --header "Content-Type: application/json" \
            "https://${{ secrets.VERCEL_APP_URL }}/api/digest")

          echo "HTTP status: $HTTP_STATUS"
          echo "Response body:"
          cat /tmp/response.json

          # Fail the workflow step if the API returned a non-2xx status.
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "ERROR: API returned HTTP $HTTP_STATUS"
            exit 1
          fi
